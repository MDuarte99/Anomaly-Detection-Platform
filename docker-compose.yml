version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - MLFLOW_TRACKING_URI=./mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  mlflow:
    image: python:3.12-slim
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    volumes:
      - ./mlruns:/mlruns
